name: Android CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.0.0
      
    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
      
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build Debug APK
      run: |
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: openzuma-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        
    - name: Show build info
      run: |
        echo "🎉 OpenZuma构建成功！"
        echo "📱 APK文件已生成"
        echo "📦 版本: 1.0"
        echo "🔧 SDK: Android 34"
        echo "🔗 构建ID: ${{ github.run_id }}"
        
    - name: Create build summary
      if: success()
      run: |
        echo "## 🎉 OpenZuma 构建成功" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **构建状态**: 成功" >> $GITHUB_STEP_SUMMARY
        echo "📱 **APK文件**: 可在Artifacts中下载" >> $GITHUB_STEP_SUMMARY
        echo "🔧 **Android SDK**: 34" >> $GITHUB_STEP_SUMMARY
        echo "🕒 **构建时间**: $(date)" >> $GITHUB_STEP_SUMMARY