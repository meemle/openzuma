name: Android Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Build with Gradle
      run: |
        echo "开始构建..."
        ./gradlew clean
        ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: openzuma-apk
        path: app/build/outputs/apk/debug/*.apk
        
    - name: Build Summary
      if: success()
      run: |
        echo "## 🎉 OpenZuma 构建成功!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 构建信息" >> $GITHUB_STEP_SUMMARY
        echo "- **状态**: ✅ 成功" >> $GITHUB_STEP_SUMMARY  
        echo "- **APK文件**: 可在Artifacts中下载" >> $GITHUB_STEP_SUMMARY
        echo "- **构建时间**: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- **运行ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 下一步" >> $GITHUB_STEP_SUMMARY
        echo "1. 下载APK文件" >> $GITHUB_STEP_SUMMARY
        echo "2. 安装到Android设备" >> $GITHUB_STEP_SUMMARY
        echo "3. 测试日历功能" >> $GITHUB_STEP_SUMMARY